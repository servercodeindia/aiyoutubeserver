# Render Configuration for YouTubeServer Backend

services:
  - type: web
    name: youtubeserver-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: |
      npm install
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /opt/render/project/src/backend/yt-dlp
      chmod a+rx /opt/render/project/src/backend/yt-dlp
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://youtubeserver.netlify.app
      - key: PATH
        value: /opt/render/project/src/backend:$PATH
    autoDeploy: true
